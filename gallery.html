<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flower Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>

<body onload="addTabFocus()">

    <a href="#main" class="skip-link">Skip to Main Content</a>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="about.html">About</a></li>
        </ul>
    </nav>

    <main id="main">

        <h1>My Flower Gallery</h1>

        <div id="image">
            Hover over an image below to display here.
        </div>

        <div class="gallery">

            <img src="image1.jpg"
                 alt="Beautiful Red Rose"
                 onmouseover="upDate(this)"
                 onmouseout="undo()"
                 onfocus="upDate(this)"
                 onblur="undo()">

            <img src="image2.jpg"
                 alt="Bright Yellow Sunflower"
                 onmouseover="upDate(this)"
                 onmouseout="undo()"
                 onfocus="upDate(this)"
                 onblur="undo()">

            <img src="image3.jpg"
                 alt="Purple Lavender Flowers"
                 onmouseover="upDate(this)"
                 onmouseout="undo()"
                 onfocus="upDate(this)"
                 onblur="undo()">

            <img src="image4.jpg"
                 alt="Pink Cherry Blossoms"
                 onmouseover="upDate(this)"
                 onmouseout="undo()"
                 onfocus="upDate(this)"
                 onblur="undo()">

            <img src="image5.jpg"
                 alt="White Daisy Flowers"
                 onmouseover="upDate(this)"
                 onmouseout="undo()"
                 onfocus="upDate(this)"
                 onblur="undo()">

            <img src="image6.jpg"
                 alt="Colorful Garden Flowers"
                 onmouseover="upDate(this)"
                 onmouseout="undo()"
                 onfocus="upDate(this)"
                 onblur="undo()">

        </div>

    </main>

    <footer>
        <p>My Favorite Flowers Project</p>
    </footer>

    <script src="script.js"></script>

</body>
</html>
